name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/iamzidar/fortify-ai

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: frontend
            context: services/frontend
          - name: api-gateway
            context: services/api-gateway
          - name: auth-service
            context: services/auth-service
          - name: ssc-service
            context: services/ssc-service
          - name: ai-service
            context: services/ai-service
          - name: dashboard-service
            context: services/dashboard-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  deploy:
    name: Deploy to k3s
    runs-on: [self-hosted, k3s]
    needs: build-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy k8s manifests
        run: |
          cp -r k8s/* /opt/fortify-ai/k8s/

      - name: Apply manifests and rolling restart
        env:
          KUBECONFIG: /home/runner/.kube/config
        run: |
          set -e
          kubectl apply -f /opt/fortify-ai/k8s/configmaps/
          kubectl apply -f /opt/fortify-ai/k8s/pvc/
          kubectl apply -f /opt/fortify-ai/k8s/services/
          kubectl apply -f /opt/fortify-ai/k8s/deployments/
          kubectl apply -f /opt/fortify-ai/k8s/ingress/
          kubectl rollout restart deployment -n fortify
          kubectl rollout status deployment/api-gateway -n fortify --timeout=120s
          kubectl rollout status deployment/frontend -n fortify --timeout=120s
          echo "Deploy complete!"
