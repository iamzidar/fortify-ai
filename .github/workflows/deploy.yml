name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/iamzidar/fortify-ai

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: frontend
            context: services/frontend
          - name: api-gateway
            context: services/api-gateway
          - name: auth-service
            context: services/auth-service
          - name: ssc-service
            context: services/ssc-service
          - name: ai-service
            context: services/ai-service
          - name: dashboard-service
            context: services/dashboard-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 10.100.34.182
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Pull latest images (k3s uses containerd — pull via ctr or crictl)
            echo "Pulling latest images from GHCR..."
            for svc in frontend api-gateway auth-service ssc-service ai-service dashboard-service; do
              k3s ctr images pull ghcr.io/iamzidar/fortify-ai/${svc}:latest
            done

            # Apply manifests
            kubectl apply -f /opt/fortify-ai/k8s/namespace.yaml
            kubectl apply -f /opt/fortify-ai/k8s/pvc/
            kubectl apply -f /opt/fortify-ai/k8s/configmaps/
            kubectl apply -f /opt/fortify-ai/k8s/deployments/
            kubectl apply -f /opt/fortify-ai/k8s/services/
            kubectl apply -f /opt/fortify-ai/k8s/ingress/

            # Rolling restart to pick up new images
            kubectl rollout restart deployment -n fortify
            kubectl rollout status deployment/api-gateway -n fortify --timeout=120s
            kubectl rollout status deployment/frontend -n fortify --timeout=120s

            echo "Deploy complete!"
