apiVersion: v1
kind: ConfigMap
metadata:
  name: fortify-common
  namespace: fortify
data:
  NODE_ENV: "production"
  FCLI_DEFAULT_SSC_URL: "https://fortify.kikoichi.dev/ssc"
  REDIS_URL: "redis://redis:6379"
  DATABASE_URL: "postgresql://fortify:$(POSTGRES_PASSWORD)@postgres:5432/fortify_audit"
  AUTH_SERVICE_URL: "http://auth-service:3002"
  SSC_SERVICE_URL: "http://ssc-service:3003"
  AI_SERVICE_URL: "http://ai-service:3004"
  DASHBOARD_SERVICE_URL: "http://dashboard-service:3005"
  CORS_ORIGIN: "https://fortify-ai.kikoichi.dev"
  ANTHROPIC_MODEL: "claude-sonnet-4-6"
  CACHE_TTL_SECONDS: "60"
