apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: fortify-ingressroute
  namespace: fortify
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`fortify-ai.kikoichi.dev`)
      kind: Rule
      priority: 1000
      services:
        - name: frontend
          port: 3000
          nativeLB: true
    - match: PathPrefix(`/`)
      kind: Rule
      priority: 700
      services:
        - name: frontend
          port: 3000
          nativeLB: true
