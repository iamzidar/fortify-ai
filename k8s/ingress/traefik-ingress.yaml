apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fortify-ingress
  namespace: fortify
  annotations:
    # Cloudflare Tunnel handles TLS externally — accept plain HTTP internally
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
