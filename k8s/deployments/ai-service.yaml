apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: fortify
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: ai-service
          image: ghcr.io/iamzidar/fortify-ai/ai-service:latest
          ports:
            - containerPort: 3004
          env:
            - name: PORT
              value: "3004"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fortify-secrets
                  key: ANTHROPIC_API_KEY
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: fortify-secrets
                  key: INTERNAL_SERVICE_SECRET
          envFrom:
            - configMapRef:
                name: fortify-common
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 10
