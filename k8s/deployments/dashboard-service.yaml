apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  namespace: fortify
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: dashboard-service
          image: ghcr.io/iamzidar/fortify-ai/dashboard-service:latest
          ports:
            - containerPort: 3005
          env:
            - name: PORT
              value: "3005"
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: fortify-secrets
                  key: INTERNAL_SERVICE_SECRET
          envFrom:
            - configMapRef:
                name: fortify-common
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 5
            periodSeconds: 10
